<!DOCTYPE html>
<html>

<head>
    <title>Thêm phòng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container mt-4">

<h2>Tạo phòng</h2>


<div class="container mt-4">

  <div class="mb-3">
    <label>Tên phòng</label>
    <input id="name" class="form-control">
  </div>

  <div class="mb-3">
    <label>Mô tả</label>
    <input id="description" class="form-control">
  </div>

  <div class="mb-3">
    <label>Số khách tối đa</label>
    <input id="guests" class="form-control">
  </div>
  
  <div class="mb-3">
    <label>Giá 1 đêm</label>
    <input id="price" class="form-control">
  </div>
  

<select id="status" class="form-control mb-3" >

  <option value="available">Available</option>
  <option value="booked">Booked</option>
  <option value="maintenance">Maintenance</option>

</select>

  <button class="btn btn-primary" onclick="createRoom()">
    Create
  </button>

</div>


</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../js/axiosClient.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/create-room.js"></script>


<script>
loadNavbar();
</script>


</body>

</html>
